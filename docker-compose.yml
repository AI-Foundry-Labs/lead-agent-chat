services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lead_agent
      POSTGRES_PASSWORD: lead_agent_dev
      POSTGRES_DB: lead_agent
    ports:
      - "5444:5432"
    volumes:
      - postgres_data_qc2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lead_agent -d lead_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://lead_agent:lead_agent_dev@db:5432/lead_agent
      RUN_DB_PUSH: "false"
      RUN_DB_MIGRATE: "true"
      RUN_DB_SEED: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      # F4a: run the scheduled-message delivery loop in this (single) app instance.
      RUN_SCHEDULER: "1"
    volumes:
      - .:/app
      - app_node_modules_qc2:/app/node_modules
    ports:
      - "3302:3000"

  telegram:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    command: npm run telegram:dev
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_started
    env_file: .env
    environment:
      DATABASE_URL: postgresql://lead_agent:lead_agent_dev@db:5432/lead_agent
      APP_BASE_URL: http://app:3000
      # The poller must NOT touch the schema — the app container owns migrations.
      # Without these, the entrypoint defaults to `drizzle-kit push --force`, which
      # hangs on an interactive truncate prompt (no TTY) and the poller never starts.
      RUN_DB_PUSH: "false"
      RUN_DB_MIGRATE: "false"
      RUN_DB_SEED: "false"
    volumes:
      - .:/app
      - app_node_modules_qc2:/app/node_modules

volumes:
  postgres_data_qc2:
  app_node_modules_qc2:
