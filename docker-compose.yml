services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lead_agent
      POSTGRES_PASSWORD: lead_agent_dev
      POSTGRES_DB: lead_agent
    ports:
      - "5442:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lead_agent -d lead_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://lead_agent:lead_agent_dev@db:5432/lead_agent
      RUN_DB_PUSH: "false"
      RUN_DB_MIGRATE: "true"
      RUN_DB_SEED: "true"
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    ports:
      - "3300:3000"

  # Telegram long-polling — receives messages without needing a public webhook URL.
  # Remove this service in production and register a webhook instead.
  telegram:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    command: npm run telegram:dev
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_started
    env_file: .env
    environment:
      DATABASE_URL: postgresql://lead_agent:lead_agent_dev@db:5432/lead_agent
      # Override so the poller forwards updates to the app container (not localhost)
      APP_BASE_URL: http://app:3000
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules

volumes:
  postgres_data:
  app_node_modules:
