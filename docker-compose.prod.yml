services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lead_agent
      POSTGRES_PASSWORD: lead_agent_dev
      POSTGRES_DB: lead_agent
    ports:
      - "5441:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lead_agent -d lead_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://lead_agent:lead_agent_dev@db:5432/lead_agent
      AI_GATEWAY_API_KEY: ${AI_GATEWAY_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-anthropic/claude-sonnet-4.6}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_INBOUND_DOMAIN: ${SENDGRID_INBOUND_DOMAIN:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-}
      GOOGLE_SERVICE_ACCOUNT_EMAIL: ${GOOGLE_SERVICE_ACCOUNT_EMAIL:-}
      GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY: ${GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY:-}
      GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://localhost:3031}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3031}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@gmail.com}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-admin123}
      SEED_ADMIN_NAME: ${SEED_ADMIN_NAME:-Camille}
      RUN_DB_PUSH: "true"
      RUN_DB_SEED: ${RUN_DB_SEED:-true}
      # F4a: deliver scheduled messages from this (single) prod app instance.
      # If scaling app >1, set this on exactly ONE replica (loop is also SKIP-LOCKED safe).
      RUN_SCHEDULER: ${RUN_SCHEDULER:-1}
    ports:
      - "3031:3000"

volumes:
  postgres_data:
